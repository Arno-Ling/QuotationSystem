[pytest]
# Pytest configuration for Exception Agent tests

# Test markers
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific scenarios
    integration: Integration tests for end-to-end workflows
    slow: Slow-running tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
source = 
    ai_modules/agents
    ai_modules/skills/exception
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
