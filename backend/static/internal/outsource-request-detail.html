<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价单详情 - MVP</title>
<link rel="stylesheet" href="/static/common.css">
<style>
  .stat-row { display:flex; gap:20px; margin-top:10px; }
  .stat-box { background:#0f172a; padding:10px 14px; border-radius:6px; min-width:110px; }
  .stat-box .num { font-size:22px; font-weight:600; }
  .stat-box .lbl { font-size:11px; color:#94a3b8; }
  .inv-status-sent { color:#fbbf24; }
  .inv-status-quoted { color:#6ee7b7; }
  .inv-status-no_response { color:#94a3b8; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/static/internal/outsource-requests.html" style="color:inherit;">🏢 委外询价单</a>
    &nbsp;›&nbsp; <span id="pTitle" style="color:#e2e8f0;">详情</span>
  </div>
  <div class="user">
    <a href="/static/internal/approvals.html" class="secondary" style="padding:6px 12px; border-radius:4px; font-size:12px;">📋 我的待办</a>
    <span class="badge">internal</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <!-- 基本信息 + 操作 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">📨 询价单 <span id="reqId"></span></h2>
      <div class="row-actions">
        <span id="statusChip" class="badge"></span>
        <button class="primary" id="btnSend" onclick="doSend()" style="display:none;">📢 群发询价</button>
        <button class="primary" id="btnClose" onclick="doCloseQuoting()"
                style="display:none; background:#f59e0b;">🔒 截止报价 → 推送审批</button>
      </div>
    </div>
    <div style="margin-top:14px;" id="basic">加载中...</div>
    <div class="stat-row" id="stats" style="display:none;"></div>
  </div>

  <!-- 候选加工方（draft 状态） -->
  <div class="card" id="candidatesCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">🎯 候选加工方</h2>
      <div class="muted" style="font-size:12px;">按匹配工艺数降序（<b>不使用 AI</b>，固定算法）</div>
    </div>
    <table style="margin-top:14px;">
      <thead>
        <tr>
          <th>供应商</th>
          <th>主营</th>
          <th>匹配工艺</th>
          <th>覆盖度</th>
          <th>联系人</th>
          <th>电话</th>
        </tr>
      </thead>
      <tbody id="candBody"></tbody>
    </table>
  </div>

  <!-- 邀请 + 报价看板（inviting / pending_award / awarded） -->
  <div class="card" id="invitationsCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">📬 邀请与报价看板</h2>
      <button class="secondary" onclick="load()">↻ 刷新</button>
    </div>
    <table style="margin-top:14px;">
      <thead>
        <tr>
          <th>供应商</th>
          <th>状态</th>
          <th>发送时间</th>
          <th>报价（元/件）</th>
          <th>交期（天）</th>
          <th>总金额</th>
          <th>提交时间</th>
          <th>备注</th>
        </tr>
      </thead>
      <tbody id="invBody"></tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('internal');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  const rid = new URLSearchParams(location.search).get('id');
  if (!rid) { alert('缺少 id'); location.href = '/static/internal/outsource-requests.html'; return; }

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function load() {
    try {
      const data = await App.api('/api/internal/outsource-requests/' + rid);
      const r = data.request;

      document.getElementById('pTitle').textContent = r.title;
      document.getElementById('reqId').textContent = '#' + r.id;

      const chip = document.getElementById('statusChip');
      chip.className = 'badge ' + r.status;
      chip.textContent = r.status;

      // 基本信息
      document.getElementById('basic').innerHTML = `
        <div>
          <b>项目</b>: <code>${App.esc(r.project_no)}</code> ${App.esc(r.project_name || '')}
          &nbsp;|&nbsp; <b>数量</b>: ${r.quantity || '—'}
          &nbsp;|&nbsp; <b>交期</b>: ${App.esc(r.deadline || '—')}
        </div>
        <div style="margin-top:6px;">
          <b>所需工艺</b>:
          ${(r.required_processes || []).map(p => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(p)+'</span>').join('')}
        </div>
      `;

      // Stats
      const s = data.stats;
      const statsEl = document.getElementById('stats');
      statsEl.style.display = r.status !== 'draft' ? 'flex' : 'none';
      statsEl.innerHTML = `
        <div class="stat-box"><div class="num">${s.total_invited}</div><div class="lbl">已邀请</div></div>
        <div class="stat-box"><div class="num inv-status-quoted">${s.quoted}</div><div class="lbl">已报价</div></div>
        <div class="stat-box"><div class="num inv-status-sent">${s.pending}</div><div class="lbl">待回复</div></div>
        <div class="stat-box"><div class="num inv-status-no_response">${s.no_response}</div><div class="lbl">已过期</div></div>
      `;

      // Buttons
      document.getElementById('btnSend').style.display  = r.status === 'draft' ? 'inline-block' : 'none';
      document.getElementById('btnClose').style.display = (r.status === 'inviting' && s.quoted > 0) ? 'inline-block' : 'none';

      // Candidates (仅 draft 状态显示)
      document.getElementById('candidatesCard').style.display = r.status === 'draft' ? 'block' : 'none';
      if (r.status === 'draft') {
        const cand = await App.api(`/api/internal/outsource-requests/${rid}/candidates`);
        const cbody = document.getElementById('candBody');
        if (!cand.items.length) {
          cbody.innerHTML = `<tr><td colspan="6" class="empty">⚠️ 没有符合工艺要求的候选加工方</td></tr>`;
        } else {
          cbody.innerHTML = cand.items.map(c => `
            <tr>
              <td><b>${App.esc(c.name)}</b></td>
              <td><span class="muted">${App.esc(c.category || '—')}</span></td>
              <td>${(c.matched_processes || []).map(p => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(p)+'</span>').join('')}</td>
              <td><code>${c.coverage}</code></td>
              <td>${App.esc(c.contact_name || '—')}</td>
              <td class="muted">${App.esc(c.contact_phone || '—')}</td>
            </tr>
          `).join('');
        }
      }

      // Invitations (non-draft 状态显示)
      document.getElementById('invitationsCard').style.display = r.status !== 'draft' ? 'block' : 'none';
      if (r.status !== 'draft') {
        const invBody = document.getElementById('invBody');
        if (!data.invitations.length) {
          invBody.innerHTML = `<tr><td colspan="8" class="empty">没有邀请</td></tr>`;
        } else {
          invBody.innerHTML = data.invitations.map(i => {
            const total = (i.unit_price && r.quantity) ? (i.unit_price * r.quantity).toFixed(2) : '—';
            return `
              <tr>
                <td>${App.esc(i.supplier_name)}</td>
                <td><span class="inv-status-${i.invitation_status}">
                  ${App.esc({sent:'待回复',quoted:'已报价',no_response:'未响应',cancelled:'已取消'}[i.invitation_status] || i.invitation_status)}
                </span></td>
                <td class="muted">${App.fmtDate(i.sent_at)}</td>
                <td>${i.unit_price != null ? '¥' + i.unit_price : '—'}</td>
                <td>${i.lead_time_days || '—'}</td>
                <td>${total === '—' ? '—' : '¥' + total}</td>
                <td class="muted">${i.submitted_at ? App.fmtDate(i.submitted_at) : '—'}</td>
                <td class="muted" style="max-width:200px;">${App.esc(i.note || '')}</td>
              </tr>
            `;
          }).join('');
        }
      }
    } catch (e) {
      toast('❌ ' + e.message, 'error');
    }
  }
  window.load = load;

  window.doSend = async () => {
    if (!confirm('将群发询价给所有符合工艺的加工方，确定？')) return;
    try {
      const r = await App.api(`/api/internal/outsource-requests/${rid}/send`, { method: 'POST' });
      toast(`✓ 已发送给 ${r.invited_count} 家加工方`);
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  window.doCloseQuoting = async () => {
    if (!confirm('截止报价后不再接受新报价，会把所有已回复的报价推送采购经理审批。确定？')) return;
    try {
      const r = await App.api(`/api/internal/outsource-requests/${rid}/close-quoting`, { method: 'POST' });
      toast(`✓ 已截止，审批任务 #${r.task_id} 已创建`);
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  load();
})();
</script>
</body>
</html>
